<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Élevage de Poulet Tycoon</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#8fd3ff;font-family:Inter,sans-serif}canvas{display:block;touch-action:none}.hud{position:fixed;inset:0;pointer-events:none;color:#342619}.card{position:absolute;background:linear-gradient(145deg,rgba(255,252,239,.94),rgba(245,228,190,.9));border:1px solid rgba(95,65,35,.22);box-shadow:0 8px 25px rgba(45,28,14,.18);backdrop-filter:blur(8px);border-radius:18px;padding:12px 15px}.title{top:max(12px,env(safe-area-inset-top));left:12px;font:700 19px Fredoka}.title small{display:block;font:600 10px Inter;color:#8a5a2c;letter-spacing:.7px}.stats{top:max(12px,env(safe-area-inset-top));right:12px;display:grid;grid-template-columns:repeat(2,auto);gap:5px 13px;font-size:11px}.stats b{font:700 15px Fredoka;color:#b84d2d}.status{left:12px;bottom:max(12px,env(safe-area-inset-bottom));max-width:min(70vw,440px);font-size:11px}.weather{right:12px;bottom:max(12px,env(safe-area-inset-bottom));font:600 12px Fredoka;text-align:right}.controls{position:absolute;right:12px;top:105px;display:flex;flex-direction:column;gap:8px;pointer-events:auto}.btn{border:0;border-radius:13px;padding:10px 12px;background:rgba(255,250,232,.94);box-shadow:0 5px 15px rgba(42,25,12,.16);font:600 12px Inter;color:#4d3423}.loading{position:fixed;inset:0;z-index:10;display:grid;place-items:center;background:linear-gradient(#9edaff,#f7d990);font:700 22px Fredoka;color:#6f3d1e;transition:.5s}.loading.hide{opacity:0;pointer-events:none}@media(max-width:620px){.title{font-size:16px}.stats{top:78px;left:12px;right:auto}.controls{top:78px}.card{padding:10px 12px}.status{max-width:62vw}}
</style>
</head>
<body>
<div id="loading" class="loading">🐔 Construction de la ferme…</div>
<div class="hud">
 <div class="card title">Élevage de Poulet Tycoon<small>FERME • COUVOIR • USINE • LIVRAISONS</small></div>
 <div class="card stats"><span>Poules <b id="hens">8</b></span><span>Œufs <b id="eggs">0</b></span><span>Poussins <b id="chicks">0</b></span><span>Caisses <b id="crates">0</b></span><span>Livraisons <b id="deliveries">0</b></span><span>Pièces <b id="coins">0</b></span></div>
 <div id="status" class="card status">Les fermiers préparent le grain et les nids.</div>
 <div class="card weather"><span id="clock">08:00</span><br><span id="weather">☀️ Ensoleillé</span></div>
 <div class="controls"><button id="overview" class="btn">🏡 Vue ferme</button><button id="factory" class="btn">🏭 Voir l’usine</button><button id="speed" class="btn">⏩ Vitesse ×1</button></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="core.js"></script>
<script src="world.js"></script>
<script src="simulation.js"></script>
</body></html>
