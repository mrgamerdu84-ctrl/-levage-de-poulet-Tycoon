<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Restauration de la Ferme avicole</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f6e7c1;font-family:Arial,sans-serif;color:#6b4423}
body{display:grid;place-items:center}
.card{width:min(86vw,420px);padding:24px;border-radius:22px;background:rgba(255,250,235,.96);box-shadow:0 18px 55px rgba(71,42,18,.28);text-align:center;border:1px solid rgba(107,68,35,.18)}
.icon{font-size:58px}.title{font-size:22px;font-weight:800;margin:8px 0}.status{font-size:13px;line-height:1.5;color:#76583e}.bar{height:10px;border-radius:999px;background:#dfcfad;overflow:hidden;margin-top:18px}.fill{height:100%;width:25%;border-radius:inherit;background:linear-gradient(90deg,#79a94c,#e0ad43);animation:load 1.2s ease-in-out infinite alternate}@keyframes load{to{width:92%}}
#error{display:none;color:#a12c24;margin-top:14px;font-size:12px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🐔</div>
  <div class="title">Restauration de ta ferme originale</div>
  <div class="status" id="status">Chargement du fichier exact que tu avais fourni au début…</div>
  <div class="bar"><div class="fill"></div></div>
  <div id="error"></div>
</div>
<script>
'use strict';
(async()=>{
  const status=document.getElementById('status');
  const error=document.getElementById('error');
  const commit='e814bf467fb5f4ed99f5c03552bec401b68c7d2a';
  const base=`https://raw.githubusercontent.com/mrgamerdu84-ctrl/-levage-de-poulet-Tycoon/${commit}/.restore/`;
  try{
    const names=['00','01','02','03','04','05','06','07'];
    const parts=[];
    for(const name of names){
      status.textContent=`Récupération de la version originale… ${Number(name)+1}/8`;
      const response=await fetch(`${base}part${name}.b64`,{cache:'force-cache'});
      if(!response.ok) throw new Error(`Copie originale introuvable (${response.status})`);
      parts.push((await response.text()).trim());
    }
    const binary=atob(parts.join(''));
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    if(bytes.length!==45900) throw new Error(`Taille incorrecte : ${bytes.length} octets au lieu de 45900`);
    if(globalThis.crypto?.subtle){
      status.textContent='Vérification de la copie originale…';
      const digest=await crypto.subtle.digest('SHA-256',bytes);
      const hash=[...new Uint8Array(digest)].map(v=>v.toString(16).padStart(2,'0')).join('');
      const expected='683b1c8c654d1a63ca788b4e231e8022c4750af8939fd1f9ca71092d67998be7';
      if(hash!==expected) throw new Error('La vérification de la copie originale a échoué.');
    }
    const html=new TextDecoder('utf-8').decode(bytes);
    if(!html.includes('<title>Ferme avicole — décor 3D</title>')) throw new Error('Le fichier récupéré ne correspond pas à ta ferme originale.');
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    status.textContent='La ferme originale est protégée, mais son chargement a échoué.';
    error.style.display='block';
    error.textContent=String(err?.message||err);
  }
})();
</script>
</body>
</html>
