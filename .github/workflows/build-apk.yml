name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-main
  cancel-in-progress: true

jobs:
  build-apk:
    name: Compiler l'APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Installer les dépendances Capacitor
        run: npm install --no-audit --no-fund

      - name: Synchroniser le projet Android
        run: npx cap sync android

      - name: Compiler l'APK debug
        working-directory: android
        run: gradle --no-daemon assembleDebug

      - name: Préparer l'APK à télécharger
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/elevage-de-poulet-tycoon.apk
          test -s release/elevage-de-poulet-tycoon.apk
          ls -lh release/elevage-de-poulet-tycoon.apk

      - name: Publier une Release APK visible
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="apk-latest"
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" release/elevage-de-poulet-tycoon.apk \
            --target "$GITHUB_SHA" \
            --title "Élevage de Poulet Tycoon - APK Android" \
            --notes "Dernière version Android compilée automatiquement depuis la branche main. Build GitHub Actions n°${GITHUB_RUN_NUMBER}." \
            --latest

      - name: Vérifier la Release et son APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="apk-latest"
          RELEASE_URL=$(gh release view "$TAG" --json url --jq '.url')
          ASSET_NAME=$(gh release view "$TAG" --json assets --jq '.assets[0].name')
          test "$ASSET_NAME" = "elevage-de-poulet-tycoon.apk"
          echo "RELEASE_URL=$RELEASE_URL" >> "$GITHUB_ENV"
          echo "Release vérifiée : $RELEASE_URL"
          echo "APK vérifié : $ASSET_NAME"

      - name: Résumé de la compilation
        run: |
          echo "## Élevage de Poulet Tycoon" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ L'APK a été compilé et vérifié." >> "$GITHUB_STEP_SUMMARY"
          echo "📦 [Télécharger la Release APK]($RELEASE_URL)" >> "$GITHUB_STEP_SUMMARY"
          echo "Fichier : \`elevage-de-poulet-tycoon.apk\`" >> "$GITHUB_STEP_SUMMARY"
