name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    name: Compiler l'APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Installer les dépendances Capacitor
        run: npm install --no-audit --no-fund

      - name: Synchroniser le projet Android
        run: npx cap sync android

      - name: Compiler l'APK debug
        working-directory: android
        run: gradle --no-daemon assembleDebug

      - name: Préparer l'APK à télécharger
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/elevage-de-poulet-tycoon.apk
          test -s artifacts/elevage-de-poulet-tycoon.apk
          ls -lh artifacts/elevage-de-poulet-tycoon.apk

      - name: Nettoyer les anciens artefacts du dépôt
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IDS=$(gh api --paginate "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100" --jq '.artifacts[].id' || true)
          if [ -z "$IDS" ]; then
            echo "Aucun ancien artefact à supprimer."
          else
            while read -r ID; do
              if [ -n "$ID" ]; then
                gh api --method DELETE "repos/$GITHUB_REPOSITORY/actions/artifacts/$ID" || true
              fi
            done <<< "$IDS"
          fi

      - name: Publier l'APK dans les artefacts
        id: upload_artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Elevage-de-Poulet-Tycoon-APK
          path: artifacts/elevage-de-poulet-tycoon.apk
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true

      - name: Attendre avant une seconde tentative
        if: steps.upload_artifact.outcome != 'success'
        run: sleep 20

      - name: Réessayer la publication de l'artefact
        id: upload_artifact_retry
        if: steps.upload_artifact.outcome != 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Elevage-de-Poulet-Tycoon-APK-secours
          path: artifacts/elevage-de-poulet-tycoon.apk
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true

      - name: Publier l'APK dans la Release de test
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="apk-latest"
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" artifacts/elevage-de-poulet-tycoon.apk \
            --target "$GITHUB_SHA" \
            --title "APK de test - dernière version" \
            --notes "APK Android de test compilé automatiquement depuis la branche main. Build GitHub Actions n°${GITHUB_RUN_NUMBER}." \
            --prerelease

      - name: Résumé de la compilation
        if: always()
        run: |
          echo "## Élevage de Poulet Tycoon" >> "$GITHUB_STEP_SUMMARY"
          echo "L'APK a été compilé et publié dans la Release **APK de test - dernière version**." >> "$GITHUB_STEP_SUMMARY"
          echo "Première tentative d'artefact : ${{ steps.upload_artifact.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Seconde tentative d'artefact : ${{ steps.upload_artifact_retry.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.upload_artifact.outcome }}" != "success" ] && [ "${{ steps.upload_artifact_retry.outcome }}" != "success" ]; then
            echo "⚠️ GitHub a refusé le stockage de l'artefact. Télécharge l'APK dans la Release de test." >> "$GITHUB_STEP_SUMMARY"
          fi
