name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Compiler l'APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Installer les dépendances Capacitor
        run: npm install --no-audit --no-fund

      - name: Synchroniser le projet Android
        run: npx cap sync android

      - name: Compiler l'APK debug
        working-directory: android
        run: gradle --no-daemon assembleDebug

      - name: Préparer l'APK à télécharger
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/elevage-de-poulet-tycoon.apk
          test -s artifacts/elevage-de-poulet-tycoon.apk

      - name: Publier l'APK dans les artefacts
        id: upload_artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Elevage-de-Poulet-Tycoon-APK
          path: artifacts/elevage-de-poulet-tycoon.apk
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Publier l'APK dans la Release de test
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="apk-latest"
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" artifacts/elevage-de-poulet-tycoon.apk \
            --target "$GITHUB_SHA" \
            --title "APK de test - dernière version" \
            --notes "APK Android de test compilé automatiquement depuis la branche main. Build GitHub Actions n°${GITHUB_RUN_NUMBER}." \
            --prerelease

      - name: Résumé de la compilation
        if: always()
        run: |
          echo "## Élevage de Poulet Tycoon" >> "$GITHUB_STEP_SUMMARY"
          echo "L'APK a été compilé et publié dans la Release **APK de test - dernière version**." >> "$GITHUB_STEP_SUMMARY"
          echo "État de l'artefact Actions : ${{ steps.upload_artifact.outcome }}" >> "$GITHUB_STEP_SUMMARY"
