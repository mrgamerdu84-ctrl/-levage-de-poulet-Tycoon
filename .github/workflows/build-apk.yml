name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: Compiler l'APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Installer les dépendances Capacitor
        run: npm install --no-audit --no-fund

      - name: Synchroniser le projet Android
        run: npx cap sync android

      - name: Compiler l'APK debug
        working-directory: android
        run: gradle --no-daemon assembleDebug

      - name: Préparer l'APK à télécharger
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/elevage-de-poulet-tycoon.apk

      - name: Publier l'APK dans les artefacts
        uses: actions/upload-artifact@v4
        with:
          name: Elevage-de-Poulet-Tycoon-APK
          path: artifacts/elevage-de-poulet-tycoon.apk
          if-no-files-found: error
          retention-days: 30
